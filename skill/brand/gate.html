        <style>
            :root {
                --drop-primary: #ff6b35;
                --drop-primary-strong: #c2410c;
                --drop-primary-hover: #9a3412;
                --drop-accent: #ea580c;
            }

            * { box-sizing: border-box; }

            .staticrypt-html { height: 100%; }

            .staticrypt-body {
                height: 100%;
                margin: 0;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;

                -moz-osx-font-smoothing: grayscale;
            }

            .staticrypt-content {

                background:

                color: #f5f5f5;
            }

            .staticrypt-page {
                width: 100%;
                max-width: 400px;
                padding: 8% 16px 0;
                margin: auto;
            }

            .drop-logo {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 9px;
                margin: 0 auto 26px;
                font-weight: 700;
                font-size: 1.15rem;
                letter-spacing: -0.01em;
                color: #fff;
            }
            .drop-logo .d {
                width: 12px; height: 12px; border-radius: 50%;
                background: linear-gradient(135deg, #ff6b35, #ea580c);
                box-shadow: 0 0 16px rgba(255, 107, 53, 0.6);
            }

            .staticrypt-form {
                position: relative;
                z-index: 1;
                background: rgba(255, 255, 255, 0.06);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 18px;
                max-width: 400px;
                margin: 0 auto 100px;
                padding: 34px 30px 30px;
                text-align: center;
                backdrop-filter: blur(18px) saturate(160%);
                -webkit-backdrop-filter: blur(18px) saturate(160%);
                box-shadow: 0 18px 60px -20px rgba(0, 0, 0, 0.7), inset 0 0.5px 0 rgba(255, 255, 255, 0.12);
            }

            .staticrypt-instructions { margin: 0 0 6px; }

            .staticrypt-title {
                font-size: 1.35em;
                font-weight: 650;
                margin: 0 0 6px;
                letter-spacing: -0.01em;
            }

            .staticrypt-instructions p:last-child {
                margin: 0;
                color: rgba(245, 245, 245, 0.62);
                font-size: 0.92em;
            }

            .staticrypt-hr {
                margin: 20px 0;
                border: 0;
                border-top: 1px solid rgba(255, 255, 255, 0.08);
            }

            .staticrypt-password-container {
                position: relative;
                background: rgba(0, 0, 0, 0.28);
                border: 1px solid rgba(255, 255, 255, 0.12);
                border-radius: 11px;
                width: 100%;
                margin: 0 0 14px;
                overflow: hidden;
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                color: #fff;
                font-size: 15px;
                outline: 0;
                padding: 15px 46px 15px 16px;
                width: 100%;
            }

            .staticrypt-form input::placeholder { color: rgba(245, 245, 245, 0.4); }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 20px;
                width: 20px;
                opacity: 0.55;
                padding: 13px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                filter: invert(1);
            }

            .staticrypt-form .staticrypt-decrypt-button {
                text-transform: uppercase;
                letter-spacing: 0.04em;
                outline: 0;
                background: linear-gradient(135deg, var(--drop-primary), var(--drop-accent));
                width: 100%;
                border: 0;
                border-radius: 11px;
                padding: 15px;
                color: #fff;
                font-size: 14px;
                font-weight: 650;
                cursor: pointer;
                transition: filter 0.15s ease, transform 0.05s ease;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover { filter: brightness(108%); }
            .staticrypt-form .staticrypt-decrypt-button:active { transform: translateY(1px); }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin-bottom: 1em;
                color: rgba(245, 245, 245, 0.7);
                font-size: 0.9em;
            }

            .staticrypt-remember input[type="checkbox"] {
                accent-color: var(--drop-primary);
                transform: scale(1.4);
                margin-right: 1em;
            }

            .drop-footer {
                text-align: center;
                margin: 22px 0 0;
                font-size: 0.78em;
                color: rgba(245, 245, 245, 0.4);
            }
            .drop-footer a { color: rgba(255, 107, 53, 0.85); text-decoration: none; }

            .hidden { display: none !important; }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #0b0b0d;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 0.25em solid rgba(255, 107, 53, 0.35);
                border-right-color: transparent;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] { font-size: 16px; }
            }
        </style>

                    toggleIcon.alt = templateToggleAltHide;

                    toggleIcon.title = templateToggleAltShow;

            document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {

                const password = document.getElementById("staticrypt-password").value,
